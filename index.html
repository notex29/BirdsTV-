<!doctype html>
<html lang="ar" dir="rtl" id="doc-html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060710" />
    <title>BirdsTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        min-height: 100vh;
        font-family: "Cairo", "Inter", system-ui, -apple-system, sans-serif;
        font-size: 16px;
        color: #fff;
        background-color: #000;
      }

      /* ── Background Image Layer ─────────────────────────────────────── */
      .bg-layer {
        position: fixed; inset: 0;
        z-index: 0; pointer-events: none;
        background-image: url('./bg.png');
        background-size: cover;
        background-position: center bottom;
        background-repeat: no-repeat;
      }
      /* Dark gradient overlay so text remains readable */
      .bg-overlay {
        position: fixed; inset: 0;
        z-index: 0; pointer-events: none;
        background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0.9) 100%);
      }

      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
      input { font-family: inherit; color: inherit; }
      :focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }

      .app { 
        min-height: 100vh; 
        display: flex; flex-direction: column; 
        position: relative; z-index: 1;
      }

      /* ── Top Bar ─────────────────────────────────────────────────────── */
      .top-bar {
        position: absolute; top: 0; left: 0; right: 0;
        padding: 16px 24px;
        display: flex; justify-content: flex-end;
        z-index: 10;
      }
      .lang-switcher {
        display: flex; gap: 8px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 4px; border-radius: 999px;
        backdrop-filter: blur(8px);
      }
      .lang-btn {
        padding: 6px 14px; border-radius: 999px;
        font-size: 13px; font-weight: 700;
        color: rgba(255,255,255,0.5);
        transition: all 150ms ease;
        text-transform: uppercase;
      }
      .lang-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
      .lang-btn.active { color: #fff; background: #6366f1; }

      /* ── Simplistic Home ────────────────────────────────────────────── */
      .home-view {
        flex: 1; display: flex; flex-direction: column;
      }
      .home-center {
        min-height: 100vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 20px;
        position: relative;
      }

      .wordmark {
        font-family: "Inter", sans-serif;
        font-size: 64px; font-weight: 900;
        letter-spacing: -2px; line-height: 1;
        margin-bottom: 32px;
        background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
        text-align: center;
      }

      /* ── Search Bar ─────────────────────────────────────────────────── */
      .search-wrap {
        width: 100%; max-width: 600px;
        margin-bottom: 32px;
      }
      .search-bar {
        display: flex; align-items: center;
        height: 64px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 32px;
        padding: 0 8px 0 24px;
        backdrop-filter: blur(16px);
        transition: border-color 200ms, box-shadow 200ms;
      }
      .search-bar:focus-within {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      }
      .search-input {
        flex: 1; background: transparent; border: 0; outline: 0;
        font-size: 18px; font-weight: 500; color: #fff;
      }
      .search-input::placeholder { color: rgba(255,255,255,0.3); }
      .search-submit {
        height: 48px; padding: 0 28px;
        border-radius: 24px;
        background: #fff; color: #000;
        font-size: 15px; font-weight: 700;
        transition: opacity 150ms;
      }
      .search-submit:hover { opacity: 0.85; }

      /* ── Horizontal Satellites Scrollview ─────────────────────────── */
      .sat-scroller {
        width: 100%; max-width: 800px;
        overflow-x: auto; overflow-y: hidden;
        white-space: nowrap;
        padding: 10px 20px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none; /* Firefox */
      }
      .sat-scroller::-webkit-scrollbar { display: none; } /* Chrome */
      .sat-scroller-inner {
        display: inline-flex; gap: 12px;
      }
      .sat-chip {
        display: inline-flex; align-items: center; gap: 8px;
        height: 40px; padding: 0 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff; font-size: 13px; font-weight: 600;
        transition: background 150ms;
        cursor: pointer; direction: ltr;
      }
      .sat-chip:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
      .sat-count {
        background: rgba(255,255,255,0.15); padding: 2px 8px;
        border-radius: 12px; font-size: 11px;
      }

      /* ── Scroll Indicator ───────────────────────────────────────────── */
      .scroll-down {
        position: absolute; bottom: 40px;
        left: 50%; transform: translateX(-50%);
        opacity: 0.5; animation: bounce 2s infinite;
        font-size: 24px; color: #fff;
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
        40% { transform: translateY(-10px) translateX(-50%); }
        60% { transform: translateY(-5px) translateX(-50%); }
      }

      /* ── SEO Marketing Section (Scroll down) ────────────────────────────────── */
      .seo-section {
        max-width: 900px; margin: 0 auto;
        padding: 100px 20px 120px;
      }
      .seo-block {
        margin-bottom: 80px;
      }
      .seo-title {
        font-size: 32px; font-weight: 800; color: #fff;
        margin-bottom: 24px; text-align: center;
      }
      .seo-text {
        font-size: 18px; line-height: 1.8;
        color: rgba(255,255,255,0.7);
        font-weight: 500; margin-bottom: 20px;
        text-align: center;
      }
      .seo-stats {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 24px; margin: 60px 0;
      }
      .stat-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; padding: 32px 20px;
        text-align: center; backdrop-filter: blur(10px);
      }
      .stat-num {
        font-size: 48px; font-weight: 900; color: #a5b4fc;
        margin-bottom: 8px; line-height: 1;
      }
      .stat-label {
        font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.6);
      }
      .features-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 32px; margin-top: 60px;
      }
      .feature-box {
        text-align: center;
      }
      .feature-title {
        font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px;
      }
      .feature-text {
        font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.6);
      }

      /* ── Results View ───────────────────────────────────────────────── */
      .results-view {
        padding: 32px 20px 60px;
        max-width: 1080px; margin: 0 auto;
        width: 100%;
      }
      .results-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
      }
      .back-btn {
        padding: 10px 20px; border-radius: 12px;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
        font-size: 14px; font-weight: 600; transition: background 150ms;
      }
      .back-btn:hover { background: rgba(255,255,255,0.2); }
      .results-sticky-search {
        max-width: 400px; width: 100%;
      }

      .grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
      }
      .card {
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; padding: 20px;
        backdrop-filter: blur(12px);
      }
      .card-name { margin: 0 0 16px; font-size: 18px; font-weight: 700; color: #fff; }
      .tx-block {
        background: rgba(255,255,255,0.04); border-radius: 8px; padding: 12px; margin-bottom: 8px;
      }
      .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
      .row:last-child { margin-bottom: 0; }
      .r-key { color: rgba(255,255,255,0.4); }
      .r-val { color: rgba(255,255,255,0.9); font-weight: 600; direction: ltr; }

      .pol-badge {
        display: inline-block; padding: 2px 8px; border-radius: 6px;
        font-size: 11px; font-weight: 800; text-transform: uppercase;
        background: rgba(255,255,255,0.15); color: #fff;
        line-height: 1.2;
      }
      .pol-v { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
      .pol-h { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
      .pol-l { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
      .pol-r { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }

      .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); font-size: 18px; }

      .quick-guide {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 10px;
        margin-top: 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.8);
      }
      .quick-guide-title {
        font-weight: 700; margin-bottom: 6px; color: #fff;
      }
      .quick-guide ul {
        margin: 0; padding-inline-start: 20px;
      }
      .quick-guide li { margin-bottom: 4px; }
      .quick-guide li:last-child { margin-bottom: 0; }
      
      .help-btn {
        width: 100%;
        margin-top: 12px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: #a5b4fc;
        font-size: 14px;
        font-weight: 600;
        transition: all 150ms;
        display: flex; align-items: center; justify-content: center; gap: 6px;
      }
      .help-btn:hover {
        background: rgba(99, 102, 241, 0.25);
        color: #fff;
      }

      /* Modal / Help Screen */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 100;
        background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        display: none; align-items: center; justify-content: center;
        padding: 20px;
      }
      .modal-overlay.active { display: flex; }
      .modal-content {
        background: #111827;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        width: 100%; max-width: 500px;
        max-height: 90vh; overflow-y: auto;
        padding: 24px;
        position: relative;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      }
      .modal-close {
        position: absolute; top: 16px; right: 16px;
        width: 32px; height: 32px; border-radius: 16px;
        background: rgba(255,255,255,0.1);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; transition: background 150ms;
        cursor: pointer; color: #fff;
      }
      .modal-close:hover { background: rgba(255,255,255,0.2); }
      html[dir="ltr"] .modal-close { right: auto; left: 16px; }

      .modal-title {
        font-size: 20px; font-weight: 800; margin: 0 0 20px;
        padding-right: 40px; color: #fff;
      }
      html[dir="ltr"] .modal-title { padding-right: 0; padding-left: 40px; }

      .recv-option {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px; padding: 16px; margin-bottom: 12px;
        cursor: pointer; transition: all 150ms;
        font-weight: 600; font-size: 15px; color: #fff;
      }
      .recv-option:hover { background: rgba(255,255,255,0.1); border-color: #6366f1; }
      
      .guide-details { display: none; }
      .guide-details.active { display: block; animation: fadeIn 0.3s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      .guide-step {
        background: rgba(255,255,255,0.03);
        border-radius: 8px; padding: 12px; margin-bottom: 12px;
        border-right: 3px solid #6366f1;
      }
      html[dir="ltr"] .guide-step { border-right: none; border-left: 3px solid #6366f1; }
      
      .guide-step-title { font-size: 13px; color: #a5b4fc; margin-bottom: 6px; font-weight: 700; }
      .guide-step-text { font-size: 14px; line-height: 1.6; color: #fff; }

      .guide-channel-info {
        display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
        background: rgba(99,102,241,0.1); padding: 12px; border-radius: 8px;
        justify-content: space-around;
      }
      .g-info-item { text-align: center; }
      .g-info-lbl { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
      .g-info-val { font-size: 15px; font-weight: 700; color: #fff; direction: ltr; }

      .back-to-options {
        display: inline-block; margin-bottom: 16px;
        font-size: 14px; color: #a5b4fc; cursor: pointer; font-weight: 600;
      }
      .back-to-options:hover { color: #fff; text-decoration: underline; }

      @media (max-width: 600px) {
        .wordmark { font-size: 48px; }
        .search-bar { height: 56px; }
        .about-text { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>
    <div id="app" class="app"></div>
    <div class="modal-overlay" id="help-modal" onclick="closeHelpModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeHelpModal(event)">×</button>
        <div id="modal-body"></div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
